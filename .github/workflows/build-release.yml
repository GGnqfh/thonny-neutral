name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 6.0.0.dev1)'
        required: true
        default: '6.0.0.dev1'

env:
  PYTHON_VERSION: '3.13'

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install pyserial pylint docutils mypy asttokens Send2Trash packaging
          pip install paramiko websockets esptool minny adafruit_board_toolkit

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          $args = @(
            "--name", "Thonny",
            "--windowed",
            "--icon", "thonny\res\thonny.ico",
            "--add-data", "thonny\VERSION;thonny",
            "--add-data", "thonny\defaults.ini;thonny",
            "--add-data", "thonny\res;thonny\res",
            "--add-data", "thonny\plugins;thonny\plugins",
            "--add-data", "thonny\locale;thonny\locale",
            "--add-data", "thonny\vendored_libs;thonny\vendored_libs",
            "--hidden-import=thonny",
            "--hidden-import=thonny.plugins.cpython_frontend",
            "--hidden-import=thonny.plugins.cpython_backend",
            "--hidden-import=thonny.plugins.micropython",
            "--hidden-import=thonny.plugins.pi",
            "--hidden-import=thonny.plugins.microbit",
            "--hidden-import=thonny.plugins.rpi_pico",
            "--hidden-import=thonny.plugins.rp2040",
            "--hidden-import=thonny.plugins.calliope",
            "--hidden-import=thonny.plugins.ev3",
            "--hidden-import=thonny.plugins.esp",
            "--hidden-import=thonny.plugins.uf2",
            "--hidden-import=thonny.plugins.debugger",
            "--hidden-import=thonny.plugins.system_shell",
            "--hidden-import=thonny.plugins.help",
            "--hidden-import=thonny.plugins.files",
            "--hidden-import=thonny.plugins.editor",
            "--hidden-import=thonny.plugins.shell",
            "--hidden-import=thonny.plugins.outline",
            "--hidden-import=thonny.plugins.ast_view"
          )
          if (python -c "import minny" 2>$null) { $args += @("--hidden-import=minny", "--collect-all", "minny") }
          if (python -c "import esptool" 2>$null) { $args += @("--collect-all", "esptool") }
          $args += "thonny\__main__.py"
          pyinstaller @args

      - name: Package as ZIP
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF -match 'refs/tags/v(.+)') { $Matches[1] } else { "${{ github.event.inputs.version }}" }
          Compress-Archive -Path dist\Thonny\* -DestinationPath dist\Thonny-$version-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thonny-windows-x64
          path: dist/*.zip

  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install core dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install pyserial docutils asttokens Send2Trash packaging

      - name: Install optional dependencies
        shell: pwsh
        run: |
          pip install pylint esptool minny paramiko websockets adafruit_board_toolkit
        continue-on-error: true

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          $args = @(
            "--name", "Thonny",
            "--windowed",
            "--icon", "thonny\res\thonny.ico",
            "--add-data", "thonny\VERSION;thonny",
            "--add-data", "thonny\defaults.ini;thonny",
            "--add-data", "thonny\res;thonny\res",
            "--add-data", "thonny\plugins;thonny\plugins",
            "--add-data", "thonny\locale;thonny\locale",
            "--add-data", "thonny\vendored_libs;thonny\vendored_libs",
            "--hidden-import=thonny",
            "--hidden-import=thonny.plugins.cpython_frontend",
            "--hidden-import=thonny.plugins.cpython_backend",
            "--hidden-import=thonny.plugins.micropython",
            "--hidden-import=thonny.plugins.pi",
            "--hidden-import=thonny.plugins.microbit",
            "--hidden-import=thonny.plugins.rpi_pico",
            "--hidden-import=thonny.plugins.rp2040",
            "--hidden-import=thonny.plugins.calliope",
            "--hidden-import=thonny.plugins.ev3",
            "--hidden-import=thonny.plugins.esp",
            "--hidden-import=thonny.plugins.uf2",
            "--hidden-import=thonny.plugins.debugger",
            "--hidden-import=thonny.plugins.system_shell",
            "--hidden-import=thonny.plugins.help",
            "--hidden-import=thonny.plugins.files",
            "--hidden-import=thonny.plugins.editor",
            "--hidden-import=thonny.plugins.shell",
            "--hidden-import=thonny.plugins.outline",
            "--hidden-import=thonny.plugins.ast_view"
          )
          if (python -c "import minny" 2>$null) { $args += @("--hidden-import=minny", "--collect-all", "minny") }
          if (python -c "import esptool" 2>$null) { $args += @("--collect-all", "esptool") }
          $args += "thonny\__main__.py"
          pyinstaller @args

      - name: Package as ZIP
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF -match 'refs/tags/v(.+)') { $Matches[1] } else { "${{ github.event.inputs.version }}" }
          Compress-Archive -Path dist\Thonny\* -DestinationPath dist\Thonny-$version-windows-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thonny-windows-arm64
          path: dist/*.zip

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install pyserial pylint docutils mypy asttokens Send2Trash packaging
          pip install paramiko websockets ptyprocess esptool minny dbus-next

      - name: Build with PyInstaller
        run: |
          pyinstaller --name Thonny \
            --windowed \
            --add-data "thonny/VERSION:thonny" \
            --add-data "thonny/defaults.ini:thonny" \
            --add-data "thonny/res:thonny/res" \
            --add-data "thonny/plugins:thonny/plugins" \
            --add-data "thonny/locale:thonny/locale" \
            --add-data "thonny/vendored_libs:thonny/vendored_libs" \
            --hidden-import=thonny \
            --hidden-import=thonny.plugins.cpython_frontend \
            --hidden-import=thonny.plugins.cpython_backend \
            --hidden-import=thonny.plugins.micropython \
            --hidden-import=thonny.plugins.pi \
            --hidden-import=thonny.plugins.microbit \
            --hidden-import=thonny.plugins.rpi_pico \
            --hidden-import=thonny.plugins.rp2040 \
            --hidden-import=thonny.plugins.calliope \
            --hidden-import=thonny.plugins.ev3 \
            --hidden-import=thonny.plugins.esp \
            --hidden-import=thonny.plugins.uf2 \
            --hidden-import=thonny.plugins.debugger \
            --hidden-import=thonny.plugins.system_shell \
            --hidden-import=thonny.plugins.help \
            --hidden-import=thonny.plugins.files \
            --hidden-import=thonny.plugins.editor \
            --hidden-import=thonny.plugins.shell \
            --hidden-import=thonny.plugins.outline \
            --hidden-import=thonny.plugins.ast_view \
            --hidden-import=minny \
            --collect-all minny \
            --collect-all esptool \
            thonny/__main__.py

      - name: Package as tarball
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            version="${{ github.event.inputs.version }}"
          fi
          cd dist
          tar -czf Thonny-$version-linux-x86_64.tar.gz -C . Thonny

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thonny-linux-x64
          path: dist/*.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install pyserial pylint docutils mypy asttokens Send2Trash packaging
          pip install paramiko websockets ptyprocess esptool minny dbus-next

      - name: Build with PyInstaller
        run: |
          pyinstaller --name Thonny \
            --windowed \
            --add-data "thonny/VERSION:thonny" \
            --add-data "thonny/defaults.ini:thonny" \
            --add-data "thonny/res:thonny/res" \
            --add-data "thonny/plugins:thonny/plugins" \
            --add-data "thonny/locale:thonny/locale" \
            --add-data "thonny/vendored_libs:thonny/vendored_libs" \
            --hidden-import=thonny \
            --hidden-import=thonny.plugins.cpython_frontend \
            --hidden-import=thonny.plugins.cpython_backend \
            --hidden-import=thonny.plugins.micropython \
            --hidden-import=thonny.plugins.pi \
            --hidden-import=thonny.plugins.microbit \
            --hidden-import=thonny.plugins.rpi_pico \
            --hidden-import=thonny.plugins.rp2040 \
            --hidden-import=thonny.plugins.calliope \
            --hidden-import=thonny.plugins.ev3 \
            --hidden-import=thonny.plugins.esp \
            --hidden-import=thonny.plugins.uf2 \
            --hidden-import=thonny.plugins.debugger \
            --hidden-import=thonny.plugins.system_shell \
            --hidden-import=thonny.plugins.help \
            --hidden-import=thonny.plugins.files \
            --hidden-import=thonny.plugins.editor \
            --hidden-import=thonny.plugins.shell \
            --hidden-import=thonny.plugins.outline \
            --hidden-import=thonny.plugins.ast_view \
            --hidden-import=minny \
            --collect-all minny \
            --collect-all esptool \
            thonny/__main__.py

      - name: Package as tarball
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            version="${{ github.event.inputs.version }}"
          fi
          cd dist
          tar -czf Thonny-$version-linux-aarch64.tar.gz -C . Thonny

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thonny-linux-arm64
          path: dist/*.tar.gz

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install pyserial pylint docutils mypy asttokens Send2Trash packaging
          pip install paramiko websockets esptool minny adafruit_board_toolkit

      - name: Build with PyInstaller
        run: |
          pyinstaller --name Thonny \
            --windowed \
            --add-data "thonny/VERSION:thonny" \
            --add-data "thonny/defaults.ini:thonny" \
            --add-data "thonny/res:thonny/res" \
            --add-data "thonny/plugins:thonny/plugins" \
            --add-data "thonny/locale:thonny/locale" \
            --add-data "thonny/vendored_libs:thonny/vendored_libs" \
            --hidden-import=thonny \
            --hidden-import=thonny.plugins.cpython_frontend \
            --hidden-import=thonny.plugins.cpython_backend \
            --hidden-import=thonny.plugins.micropython \
            --hidden-import=thonny.plugins.pi \
            --hidden-import=thonny.plugins.microbit \
            --hidden-import=thonny.plugins.rpi_pico \
            --hidden-import=thonny.plugins.rp2040 \
            --hidden-import=thonny.plugins.calliope \
            --hidden-import=thonny.plugins.ev3 \
            --hidden-import=thonny.plugins.esp \
            --hidden-import=thonny.plugins.uf2 \
            --hidden-import=thonny.plugins.debugger \
            --hidden-import=thonny.plugins.system_shell \
            --hidden-import=thonny.plugins.help \
            --hidden-import=thonny.plugins.files \
            --hidden-import=thonny.plugins.editor \
            --hidden-import=thonny.plugins.shell \
            --hidden-import=thonny.plugins.outline \
            --hidden-import=thonny.plugins.ast_view \
            --hidden-import=minny \
            --collect-all minny \
            --collect-all esptool \
            thonny/__main__.py

      - name: Package as ZIP
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            version="${{ github.event.inputs.version }}"
          fi
          cd dist
          zip -r Thonny-$version-macos-arm64.zip Thonny.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thonny-macos-arm64
          path: dist/*.zip

  build-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
