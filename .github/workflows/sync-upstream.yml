name: Sync upstream and create neutral release

on:
  schedule:
    - cron: '0 6 * * *'       # daily at UTC 06:00 = Beijing 14:00
  workflow_dispatch:           # also supports manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git
        run: |
          git config user.name "thonny-neutral bot"
          git config user.email "bot@thonny-neutral"

      - name: Add remotes
        run: |
          git remote add upstream https://github.com/thonny/thonny.git || true
          git remote add fork https://github.com/GGnqfh/thonny-neutral.git || true

      - name: Fetch upstream tags
        run: git fetch upstream --tags

      - name: Sync neutral releases
        id: sync
        shell: bash
        run: |
          python tools/sync_upstream.py 2>&1 | tee /tmp/sync_output.txt
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit $exit_code

      - name: Write logs to summary
        if: always()
        shell: bash
        run: |
          echo '## Sync Output' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/sync_output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Trigger build for new neutral tag
        if: steps.sync.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest_tag=$(git tag -l "*-neutral" --sort=-version:refname | head -1)
          echo "Triggering build for $latest_tag"
          gh workflow run build.yml --ref "$latest_tag"
