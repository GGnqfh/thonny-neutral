name: Sync upstream and create neutral release

on:
  schedule:
    - cron: '0 6 * * *'       # daily at UTC 06:00 = Beijing 14:00
  workflow_dispatch:           # also supports manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Add upstream remote
        run: git remote add upstream https://github.com/thonny/thonny.git

      - name: Fetch upstream tags
        run: git fetch upstream --tags

      - name: Sync neutral releases
        shell: bash
        run: |
          set -o pipefail
          python tools/sync_upstream.py 2>&1 | tee /tmp/sync_output.txt

      - name: Upload sync logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs
          path: /tmp/sync_output.txt
